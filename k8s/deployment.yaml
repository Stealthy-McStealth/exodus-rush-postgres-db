apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: passover
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          value: exodus
        - name: POSTGRES_PASSWORD
          value: passover2026
        - name: POSTGRES_DB
          value: exodus_rush
        - name: POSTGRES_INITDB_ARGS
          value: "--encoding=UTF8"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - exodus
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - exodus
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-data
        emptyDir: {}
